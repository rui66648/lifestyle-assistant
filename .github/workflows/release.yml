name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build JS bundle
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        if: secrets.SIGNING_KEY != ''
        run: |
          mkdir -p android/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/release.jks

      - name: Create keystore.properties
        if: secrets.KEYSTORE_PASSWORD != ''
        run: |
          cat > android/keystore.properties << EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create local.properties
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_HOME
          CLOUD_AI_URL=${{ secrets.CLOUD_AI_URL }}
          CLOUD_AI_KEY=${{ secrets.CLOUD_AI_KEY }}
          CLOUD_AI_MODEL=${{ secrets.CLOUD_AI_MODEL }}
          QWEATHER_API_KEY=${{ secrets.QWEATHER_API_KEY }}
          UPDATE_JSON_URL=${{ secrets.UPDATE_JSON_URL }}
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
