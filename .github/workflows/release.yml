name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 通过 env 中转 secrets，使 step 的 if 条件可以判断
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        if: env.SIGNING_KEY != ''
        run: |
          mkdir -p android/app
          echo "$SIGNING_KEY" | base64 --decode > android/app/release.jks

      - name: Create keystore.properties
        if: env.KEYSTORE_PASSWORD != ''
        run: |
          cat > android/keystore.properties << EOF
          storeFile=release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Create local.properties
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_HOME
          CLOUD_AI_URL=${{ secrets.CLOUD_AI_URL }}
          CLOUD_AI_KEY=${{ secrets.CLOUD_AI_KEY }}
          CLOUD_AI_MODEL=${{ secrets.CLOUD_AI_MODEL }}
          QWEATHER_API_KEY=${{ secrets.QWEATHER_API_KEY }}
          UPDATE_JSON_URL=${{ secrets.UPDATE_JSON_URL }}
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tee gradle_build.log
          echo "=== Gradle exit code: ${PIPESTATUS[0]} ==="
          cat gradle_build.log | tail -200
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Gradle build failed with exit code ${PIPESTATUS[0]}"
            exit 1
          fi

      - name: Archive APK
        run: |
          cd android
          VERSION=$(grep -oE 'versionName "[^"]+"' app/build.gradle | head -1 | sed 's/versionName "//;s/"//')
          echo "Detected versionName: $VERSION"
          TARGET="app/build/outputs/apk/release/PulseBreath-${VERSION}.apk"
          # 兼容两种情况：1) 已存在 PulseBreath-*.apk  2) 只有 app-release.apk
          if ls app/build/outputs/apk/release/PulseBreath-*.apk 2>/dev/null; then
            echo "PulseBreath APK already exists, no copy needed"
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp "app/build/outputs/apk/release/app-release.apk" "$TARGET"
            echo "Copied app-release.apk -> $TARGET"
          else
            echo "::error::No APK found in app/build/outputs/apk/release/"
            ls -la app/build/outputs/apk/release/ 2>&1 || echo "release dir missing"
            exit 1
          fi
          echo "=== Final APK files ==="
          ls -la app/build/outputs/apk/release/PulseBreath-*.apk

      - name: List build outputs
        run: |
          echo "=== APK directory contents ==="
          ls -la android/app/build/outputs/apk/release/ 2>&1 || echo "release dir missing"
          if ! ls android/app/build/outputs/apk/release/PulseBreath-*.apk 2>/dev/null; then
            echo "::error::PulseBreath-*.apk not found in build outputs"
            exit 1
          fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/PulseBreath-*.apk
          generate_release_notes: true
