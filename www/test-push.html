<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推送功能测试</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
.card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size: 20px; margin: 0 0 16px; }
.btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; color: #fff; background: linear-gradient(135deg,#ff6b6b,#ee5a5a); margin: 8px 0; cursor: pointer; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-green { background: linear-gradient(135deg,#2ecc71,#27ae60); }
.btn-blue { background: linear-gradient(135deg,#3498db,#2980b9); }
.result { margin-top: 12px; padding: 12px; border-radius: 8px; background: #f8f9fa; font-size: 13px; line-height: 1.6; word-break: break-all; }
.result.ok { background: #d4edda; color: #155724; }
.result.err { background: #f8d7da; color: #721c24; }
.pass { color: #2ecc71; font-weight: bold; }
.fail { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>
<div class="card">
  <h1>🔔 推送功能测试</h1>
  <p style="font-size:13px;color:#666;margin-bottom:16px;">
    Worker URL: <code>https://ai-proxy.3487331518.workers.dev</code>
  </p>
  <button class="btn btn-blue" onclick="testStatus()">1️⃣ 测试服务状态</button>
  <button class="btn" onclick="testSubscribe()">2️⃣ 测试订阅推送</button>
  <button class="btn btn-green" onclick="testPush()">3️⃣ 发送测试推送</button>
  <div id="result" class="result" style="display:none"></div>
</div>

<div class="card">
  <h1>🤖 AI 功能测试</h1>
  <button class="btn btn-blue" onclick="testAi()">4️⃣ 测试 AI 对话</button>
</div>

<script>
const WORKER_URL = 'https://ai-proxy.3487331518.workers.dev';
const VAPID_PUBLIC_KEY = 'BM-yFa2y8NJ8iob-46qSH2sCjkRxr43gUgGbRAFJkoivKJ076fuXAHohFuCKh5pAp-UtLJYIztN9HU9oU6dJchg';

function show(msg, ok) {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'result ' + (ok ? 'ok' : 'err');
  el.innerHTML = msg;
}

async function testStatus() {
  show('正在测试...', true);
  try {
    const r = await fetch(WORKER_URL + '/push/status');
    const data = await r.json();
    show(
      '<span class="pass">✅ 服务正常</span><br>' +
      '订阅数: ' + data.subs + '<br>' +
      '提醒数: ' + data.scheduleCount + '<br>' +
      '时区偏移: ' + data.offset + ' 分钟<br>' +
      'VAPID: ' + (data.vapidConfigured ? '✅ 已配置' : '❌ 未配置'),
      true
    );
  } catch(e) {
    show('<span class="fail">❌ 测试失败</span><br>' + e.message, false);
  }
}

async function testSubscribe() {
  show('正在请求通知权限...', true);
  if (!('Notification' in window)) {
    show('<span class="fail">❌ 浏览器不支持通知</span>', false); return;
  }
  if (!('serviceWorker' in navigator)) {
    show('<span class="fail">❌ 浏览器不支持 Service Worker</span>', false); return;
  }
  
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      show('<span class="fail">❌ 未获得通知权限</span>', false); return;
    }
    
    const reg = await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;
    
    const existing = await reg.pushManager.getSubscription();
    let sub = existing;
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    
    const r = await fetch(WORKER_URL + '/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });
    const data = await r.json();
    show('<span class="pass">✅ 订阅成功</span><br>订阅总数: ' + data.total, true);
  } catch(e) {
    show('<span class="fail">❌ 订阅失败</span><br>' + e.message, false);
  }
}

async function testPush() {
  show('正在发送测试推送...', true);
  try {
    const r = await fetch(WORKER_URL + '/push/test', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      show('<span class="pass">✅ 测试推送已发送</span><br>请在手机通知栏查看', true);
    } else {
      show('<span class="fail">❌ 发送失败</span><br>' + (data.error || data.status || '未知错误'), false);
    }
  } catch(e) {
    show('<span class="fail">❌ 请求失败</span><br>' + e.message, false);
  }
}

async function testAi() {
  show('正在测试 AI...', true);
  try {
    const r = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: '你好' }] })
    });
    const data = await r.json();
    if (data.choices && data.choices[0]) {
      show('<span class="pass">✅ AI 正常</span><br>回复: ' + data.choices[0].message.content.substring(0, 100) + '...', true);
    } else if (data.error) {
      show('<span class="fail">❌ AI 错误</span><br>' + data.error, false);
    } else {
      show('<span class="fail">❌ 未知响应</span><br>' + JSON.stringify(data).substring(0, 200), false);
    }
  } catch(e) {
    show('<span class="fail">❌ 请求失败</span><br>' + e.message, false);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
</script>
</body>
</html>
