apply plugin: 'com.android.application'

// ============================================================
// 从 android/local.properties 读取云端 AI 密钥/配置，注入 BuildConfig
// 在 android/local.properties 中配置：
//   CLOUD_AI_URL=https://你的Worker或代理地址
//   CLOUD_AI_KEY=sk-xxxx
//   CLOUD_AI_MODEL=qwen-max
//   QWEATHER_API_KEY=xxxx   (可选)
// 这些值仅在编译进 apk 时存在，不会进源码/仓库
// ============================================================
def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { stream -> localProps.load(stream) }
}

android {
    namespace = "com.rui66648.lifestyle"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.rui66648.lifestyle"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.3"
        // ---- 云端 AI 配置注入（来自 local.properties）----
        buildConfigField "String", "CLOUD_AI_URL", "\"${localProps.getProperty("CLOUD_AI_URL", "")}\""
        buildConfigField "String", "CLOUD_AI_KEY", "\"${localProps.getProperty("CLOUD_AI_KEY", "")}\""
        buildConfigField "String", "CLOUD_AI_MODEL", "\"${localProps.getProperty("CLOUD_AI_MODEL", "qwen-max")}\""
        buildConfigField "String", "QWEATHER_API_KEY", "\"${localProps.getProperty("QWEATHER_API_KEY", "")}\""
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file("release.jks")
            storePassword "rui66648"
            keyAlias "release"
            keyPassword "rui66648"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        buildConfig = true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// ============================================================
// 构建时把 local.properties 的云端配置写入 www/app-config.js，
// 供 WebView 内的 JS 读取（Java 的 BuildConfig 无法被 Web 层直接访问）。
// 改完 local.properties 后需重新构建；若用 Capacitor，
// 运行 `npx cap sync`（或 `npx cap copy android`）使其生效。
// ============================================================
task generateAppConfigJs {
    doLast {
        def url       = localProps.getProperty("CLOUD_AI_URL", "")
        def key       = localProps.getProperty("CLOUD_AI_KEY", "")
        def model     = localProps.getProperty("CLOUD_AI_MODEL", "qwen-max")
        def qw        = localProps.getProperty("QWEATHER_API_KEY", "")
        def updateUrl = localProps.getProperty("UPDATE_JSON_URL", "")
        def vc        = android.defaultConfig.versionCode
        def vn        = android.defaultConfig.versionName
        def esc = { s -> s.replace('\\', '\\\\').replace('"', '\\"') }
        def content = """// AUTO-GENERATED by Gradle. Do NOT edit manually. (git-ignored)
window.__APP_CONFIG__ = {
  cloudAiUrl:    "${esc(url)}",
  cloudAiKey:    "${esc(key)}",
  cloudAiModel:  "${esc(model)}",
  qweatherKey:   "${esc(qw)}",
  updateJsonUrl: "${esc(updateUrl)}",
  appVersionCode: ${vc},
  appVersionName: "${esc(vn)}"
};
"""
        def outFile = rootProject.file("../www/app-config.js")
        outFile.parentFile.mkdirs()
        outFile.text = content
        // 同时写入 assets/public，确保合并进 APK（preBuild 早于 mergeAssets，故会被打包）
        def assetsFile = rootProject.file("app/src/main/assets/public/app-config.js")
        assetsFile.parentFile.mkdirs()
        assetsFile.text = content
        logger.lifecycle("[app-config] 已生成 ${outFile} 与 ${assetsFile} (url=${url ? 'set' : 'empty'}, key=${key ? 'set' : 'empty'})")
    }
}
preBuild.dependsOn generateAppConfigJs
