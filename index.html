<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#FDF8F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="习惯打卡">
<link rel="manifest" href="./manifest.json">
<title>生活习惯小助手 V2</title>
<style>
@font-face{font-family:'InstrumentSans';src:url('./_shared/fonts/InstrumentSans-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
:root{--bg:#FDF8F0;--bg2:#F5EDE0;--ink:#2D3436;--muted:#8D9196;--rule:#E0D8CC;--accent:#7CB69D;--accent2:#F4A683;--accent-light:#B8DCC9;--accent2-light:#FBD5C0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'InstrumentSans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}
img{max-width:100%;display:block}

/* 今日养生卡片 */
.today-card{border-radius:var(--radius);margin:0 16px 12px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.today-card.spring{background:linear-gradient(135deg,#e8f5e9,#d4edda)}
.today-card.summer{background:linear-gradient(135deg,#ffebee,#ffe0b2)}
.today-card.autumn{background:linear-gradient(135deg,#fff8e1,#ffe0b2)}
.today-card.winter{background:linear-gradient(135deg,#e3f2fd,#d1ecf1)}
.today-header{margin-bottom:10px}
.today-date-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.today-date{font-size:15px;font-weight:700;color:var(--ink)}
.today-lunar{font-size:12px;color:var(--muted);background:rgba(255,255,255,.6);padding:2px 8px;border-radius:8px}
.today-badges{display:flex;gap:6px;flex-wrap:wrap}
.today-season-tip{font-size:13px;color:var(--ink);font-weight:600;line-height:1.5;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.06)}
.quote-card{background:linear-gradient(135deg,#e8f5e9,#e3f2fd);border-radius:16px;padding:16px;margin:0 16px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.quote-title{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.quote-text{font-size:16px;font-weight:600;color:var(--ink);line-height:1.8;margin-bottom:8px}
.quote-source{font-size:13px;color:var(--accent);font-weight:600;text-align:right}
.quote-refresh{font-size:12px;color:var(--muted);text-align:center;padding-top:8px;cursor:pointer;border-top:1px dashed rgba(0,0,0,.1);margin-top:8px}
.quote-refresh:active{opacity:.7}
.today-ref-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);font-weight:600;text-decoration:none;padding:4px 10px;background:rgba(255,255,255,.6);border-radius:8px;transition:all .2s}
.today-ref-link:active{background:var(--accent);color:#fff}

/* Reminder Banner */
.reminder-banner{background:var(--bg2);border-radius:var(--radius);margin:12px 16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.reminder-banner .text{font-size:13px;color:var(--ink);flex:1;line-height:1.4}
.reminder-banner .settings-btn{font-size:20px;padding:4px 8px;border-radius:8px;transition:background .2s}
.reminder-banner .settings-btn:active{background:var(--rule)}

/* Tabs */
.tabs{display:flex;margin:0 16px;border-bottom:2px solid var(--rule);gap:0}
.tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:active{opacity:.7}

/* Sections */
.section{display:none;padding:16px}
.section.active{display:block}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Time Period Groups */
.time-group{margin-bottom:20px}
.time-group-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}

/* Habit Cards */
.habit-card{background:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:all .2s;position:relative;overflow:hidden}
.habit-card:active{transform:scale(.98)}
.habit-card .icon{font-size:28px;width:36px;text-align:center;flex-shrink:0}
.habit-card .info{flex:1;min-width:0}
.habit-card .name{font-size:15px;font-weight:600;margin-bottom:2px}
.habit-card .meta{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center}
.habit-card .streak{font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:10px;font-weight:600}
.habit-card .checkin-btn{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;transition:all .2s;flex-shrink:0}
.habit-card .checkin-btn.pending{background:var(--accent);color:#fff}
.habit-card .checkin-btn.pending:active{background:#6aa88a}
.habit-card .checkin-btn.done{background:var(--accent-light);color:var(--accent)}
.habit-card .delete-btn{position:absolute;bottom:0;left:0;right:0;background:#e74c3c;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;transform:translateY(100%);transition:transform .3s}
.habit-card.show-delete .delete-btn{transform:translateY(0)}

/* Ring Progress */
.ring-container{display:flex;justify-content:center;align-items:center;margin:20px 0}
.ring-wrap{position:relative;width:160px;height:160px}
.ring-svg{width:160px;height:160px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:12}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:32px;font-weight:700;color:var(--accent)}
.ring-label{font-size:12px;color:var(--muted)}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:20px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* Ranking */
.ranking-item{margin-bottom:10px}
.ranking-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ranking-name{font-size:13px;font-weight:600}
.ranking-pct{font-size:13px;font-weight:700;color:var(--accent)}
.ranking-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.ranking-fill{height:100%;border-radius:4px;transition:width .6s ease}
.ranking-fill.high{background:var(--accent)}
.ranking-fill.mid{background:var(--accent2)}
.ranking-fill.low{background:var(--rule)}

/* Heatmap */
.heatmap{margin:16px 0}
.heatmap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.heatmap-title{font-size:14px;font-weight:600}
.heatmap-nav{display:flex;gap:8px;align-items:center}
.heatmap-nav button{font-size:18px;padding:2px 8px;border-radius:6px}
.heatmap-nav button:active{background:var(--rule)}
.heatmap-month{font-size:14px;font-weight:600;min-width:100px;text-align:center}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-day-label{font-size:10px;color:var(--muted);text-align:center;padding:2px 0}
.heatmap-cell{aspect-ratio:1;border-radius:4px;background:var(--bg2);transition:background .2s}
.heatmap-cell.l1{background:var(--accent-light)}
.heatmap-cell.l2{background:var(--accent)}
.heatmap-cell.l3{background:#5a9e7e}
.heatmap-cell.l4{background:#3d7a5f}
.heatmap-cell.empty{background:transparent}
.heatmap-cell.today{outline:2px solid var(--accent2);outline-offset:1px}

/* Achievements */
.achievements{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.badge{width:60px;text-align:center}
.badge-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 4px;box-shadow:var(--shadow)}
.badge-icon.locked{background:var(--bg2);filter:grayscale(1);opacity:.5}
.badge-icon.unlocked{background:linear-gradient(135deg,var(--accent-light),var(--accent2-light))}
.badge-label{font-size:10px;color:var(--muted)}
.badge-label.unlocked{color:var(--ink);font-weight:600}

/* Bottom Panels */
.panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;max-height:80vh;background:var(--bg);border-radius:20px 20px 0 0;z-index:101;transition:transform .3s ease;overflow:hidden;display:flex;flex-direction:column}
.panel.show{transform:translateX(-50%) translateY(0)}
.panel-handle{width:40px;height:4px;background:var(--rule);border-radius:2px;margin:10px auto 6px}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 12px;border-bottom:1px solid var(--rule)}
.panel-title{font-size:16px;font-weight:700}
.panel-close{font-size:20px;padding:4px 8px;border-radius:8px}
.panel-close:active{background:var(--rule)}
.panel-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* Habit Library Panel */
.lib-search{width:100%;padding:10px 14px;border:2px solid var(--rule);border-radius:12px;font-size:14px;background:#fff;outline:none;margin-bottom:12px}
.lib-search:focus{border-color:var(--accent)}
.lib-category{margin-bottom:16px}
.lib-cat-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px}
.lib-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;box-shadow:var(--shadow)}
.lib-item .icon{font-size:22px}
.lib-item .name{font-size:14px;flex:1}
.lib-item .type-tag{font-size:11px;color:var(--muted);background:var(--bg2);padding:2px 8px;border-radius:8px}
.lib-item .add-btn{padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;background:var(--accent);color:#fff}
.lib-item .add-btn:active{background:#6aa88a}
.lib-item .add-btn.added{background:var(--bg2);color:var(--muted)}
.lib-custom{margin-top:12px}
.lib-custom-input{display:flex;gap:8px}
.lib-custom-input input{flex:1;padding:10px 14px;border:2px solid var(--rule);border-radius:12px;font-size:14px;background:#fff;outline:none}
.lib-custom-input input:focus{border-color:var(--accent)}
.lib-custom-input button{padding:10px 16px;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;white-space:nowrap}
.lib-custom-input button:active{background:#6aa88a}
.lib-custom-type{display:flex;gap:8px;margin-top:8px}
.lib-custom-type button{padding:6px 12px;border-radius:10px;font-size:12px;background:var(--bg2);font-weight:600}
.lib-custom-type button.active{background:var(--accent);color:#fff}

/* Checkin Input */
.checkin-input-wrap{text-align:center;padding:20px 0}
.checkin-input-label{font-size:16px;font-weight:600;margin-bottom:16px}
.checkin-input-field{width:120px;height:60px;font-size:32px;font-weight:700;text-align:center;border:3px solid var(--rule);border-radius:16px;outline:none;color:var(--ink)}
.checkin-input-field:focus{border-color:var(--accent)}
.checkin-input-unit{font-size:14px;color:var(--muted);margin-top:8px}
.checkin-input-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.checkin-input-actions button{padding:12px 32px;border-radius:20px;font-size:15px;font-weight:600}
.checkin-input-actions .cancel{background:var(--bg2);color:var(--muted)}
.checkin-input-actions .confirm{background:var(--accent);color:#fff}

/* Reminder Settings */
.reminder-option{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow)}
.reminder-option .radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--rule);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.reminder-option .radio.active{border-color:var(--accent)}
.reminder-option .radio.active::after{content:'';width:12px;height:12px;border-radius:50%;background:var(--accent)}
.reminder-option .label{font-size:14px;flex:1}
.reminder-option .desc{font-size:12px;color:var(--muted)}

/* Time Picker */
.time-picker-wrap{text-align:center;padding:10px 0}
.time-picker-wrap label{font-size:14px;color:var(--muted);display:block;margin-bottom:8px}
.time-picker-wrap input[type="time"]{font-size:28px;padding:8px 16px;border:2px solid var(--rule);border-radius:12px;outline:none;color:var(--ink)}
.time-picker-wrap input[type="time"]:focus{border-color:var(--accent)}
.days-selector{display:flex;gap:6px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.day-btn{width:40px;height:40px;border-radius:50%;font-size:13px;font-weight:600;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.day-btn.active{background:var(--accent);color:#fff}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.toggle-label{font-size:14px;font-weight:600}
.toggle-switch{width:48px;height:26px;border-radius:13px;background:var(--rule);position:relative;transition:background .2s}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on::after{transform:translateX(22px)}

/* Weekly Report */
.report-card{background:linear-gradient(135deg,var(--accent-light),var(--accent2-light));border-radius:var(--radius);padding:20px;margin-bottom:12px}
.report-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}
.report-stat{display:flex;justify-content:space-around;text-align:center;margin-bottom:16px}
.report-stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.report-stat-label{font-size:12px;color:var(--muted)}
.report-item{background:rgba(255,255,255,.7);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.report-item .emoji{font-size:24px}
.report-item .text{font-size:13px;flex:1}

/* Health Tip */


/* Edit Mode */

/* 子午流注 Clock */
.clock-current{background:linear-gradient(135deg,var(--accent-light),var(--accent2-light));border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center}
.clock-current .shi{font-size:28px;font-weight:700;color:var(--ink)}
.clock-current .meridian{font-size:14px;color:var(--muted);margin:4px 0}
.clock-current .action{font-size:16px;font-weight:600;color:var(--accent);margin:6px 0}
.clock-current .detail{font-size:13px;color:var(--muted);font-style:italic}
.clock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.clock-card{background:#fff;border-radius:12px;padding:10px 12px;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.clock-card.active{border:2px solid var(--accent);background:var(--accent-light)}
.clock-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.clock-card .shi-name{font-size:15px;font-weight:700}
.clock-card .shi-time{font-size:11px;color:var(--muted);font-family:var(--font-mono,monospace)}
.clock-card .shi-meridian{font-size:12px;color:var(--accent);font-weight:600}
.clock-card .shi-action{font-size:12px;color:var(--ink);line-height:1.4;margin-top:2px}
.edit-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);margin:0 16px 12px}
.edit-bar .label{font-size:13px;font-weight:600;color:var(--muted)}
.edit-bar button{padding:8px 16px;border-radius:16px;font-size:13px;font-weight:600}
.edit-bar .edit-on{background:var(--accent2);color:#fff}
.edit-bar .edit-off{background:var(--bg2);color:var(--muted)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--ink);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s ease;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Add Habit FAB */
.fab{position:fixed;bottom:90px;right:calc(50% - 220px);width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,182,157,.4);z-index:50;transition:transform .2s}
.fab:active{transform:scale(.9)}
@media(max-width:480px){.fab{right:20px}}

/* Export */
.export-btn{width:100%;padding:14px;border-radius:var(--radius);background:var(--bg2);font-size:14px;font-weight:600;color:var(--muted);margin-top:16px}
.export-btn:active{background:var(--rule)}

/* Water Tracker */
.water-tracker{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.water-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.water-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.water-amount{font-size:13px;color:var(--muted)}
.water-progress{height:16px;background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:8px;position:relative}
.water-progress-fill{height:100%;border-radius:8px;transition:width .5s ease;background:var(--accent2)}
.water-progress-fill.mid{background:var(--accent-light)}
.water-progress-fill.high{background:var(--accent)}
.water-progress-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:var(--ink)}
.water-schedule{margin-top:10px}
.water-schedule-title{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.water-schedule-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--bg2)}
.water-schedule-item:last-child{border-bottom:none}
.water-schedule-time{color:var(--muted);min-width:45px;font-weight:600}
.water-schedule-label{flex:1;color:var(--ink)}
.water-schedule-amount{color:var(--accent);font-weight:600}
.water-schedule-done{color:var(--accent);font-weight:700}
.water-records{margin-top:10px}
.water-record{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--muted)}
.water-record-time{min-width:45px}
.water-record-amount{color:var(--accent);font-weight:600}
.water-quick-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.water-quick-btn{padding:8px 16px;border-radius:12px;font-size:13px;font-weight:600;background:var(--bg2);color:var(--ink);transition:all .2s}
.water-quick-btn:active{background:var(--accent);color:#fff}
.water-quick-btn.primary{background:var(--accent);color:#fff}
.water-quick-btn.primary:active{background:#6aa88a}

/* Season Banner */
.season-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600;margin-left:8px}
.season-badge.spring{background:#d4edda;color:#155724}
.season-badge.summer{background:#f8d7da;color:#721c24}
.season-badge.autumn{background:#fff3cd;color:#856404}
.season-badge.winter{background:#d1ecf1;color:#0c5460}
.season-pack-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s}
.season-pack-card:active{transform:scale(.98)}
.season-pack-card.current{border:2px solid var(--accent)}
.season-pack-card.other{opacity:.6;border:2px solid var(--rule)}
.season-pack-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.season-pack-icon{font-size:28px}
.season-pack-title{font-size:15px;font-weight:700}
.season-pack-subtitle{font-size:12px;color:var(--muted)}
.season-pack-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.season-pack-quote{font-size:11px;color:var(--muted);font-style:italic;background:var(--bg2);padding:8px 12px;border-radius:8px;margin-bottom:8px;line-height:1.6}
.season-pack-footer{display:flex;justify-content:space-between;align-items:center}
.season-pack-count{font-size:12px;color:var(--muted)}
.season-pack-btn{padding:6px 16px;border-radius:14px;font-size:12px;font-weight:600;background:var(--accent);color:#fff}
.season-pack-btn.added{background:var(--bg2);color:var(--muted)}
.season-tip{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin:0 16px 12px;font-size:13px;line-height:1.6;color:var(--muted);display:flex;gap:8px;align-items:flex-start}
.season-tip .tip-icon{font-size:18px;flex-shrink:0}
.season-tip .tip-text em{font-style:normal;color:var(--ink);font-weight:600}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}

/* Collapsed habits */
.habit-card.collapsed{max-height:0;overflow:hidden;padding-top:0;padding-bottom:0;margin:0;opacity:0;transition:all .35s ease}
.time-group-label{cursor:pointer;user-select:none}
.time-group-label .collapse-count{font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:10px;margin-left:auto;font-weight:600}
.time-group-header{display:flex;align-items:center;justify-content:space-between;width:100%}
.time-group.collapsed-group .time-group-label{opacity:.6}
.time-group.collapsed-group .habit-card:not(.collapsed){margin-top:6px}

/* Ref Link in Health Tip */
.ref-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);font-weight:600;text-decoration:none;margin-top:6px;padding:4px 10px;background:rgba(124,182,157,0.1);border-radius:8px;transition:all .2s}
.ref-link:active{background:var(--accent);color:#fff}
.ref-link svg{width:14px;height:14px}

/* Ref Panel */
.ref-panel-header{text-align:center;margin-bottom:16px}
.ref-panel-header h3{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px}
.ref-panel-header p{font-size:12px;color:var(--muted)}
.ref-tabs{display:flex;gap:8px;margin:12px 0;background:var(--bg2);border-radius:12px;padding:4px}
.ref-tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted)}
.ref-tab.active{background:var(--accent);color:#fff}
.ref-section-title{font-size:13px;font-weight:700;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.ref-card{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);transition:all .2s;text-decoration:none;color:var(--ink)}
.ref-card:active{transform:scale(.98);opacity:.8}
.ref-card .ref-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ref-card .ref-icon.ancient{background:linear-gradient(135deg,#F4A683,#E8956A)}
.ref-card .ref-icon.modern{background:linear-gradient(135deg,#7CB69D,#5FA882)}
.ref-card .ref-info{flex:1;min-width:0}
.ref-card .ref-name{font-size:14px;font-weight:700;margin-bottom:2px}
.ref-card .ref-author{font-size:11px;color:var(--muted)}
.ref-card .ref-arrow{font-size:16px;color:var(--muted);flex-shrink:0}
.ref-lib-btn{display:block;width:100%;padding:14px;border-radius:14px;text-align:center;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));margin-top:12px;text-decoration:none;box-shadow:var(--shadow)}
.ref-lib-btn:active{opacity:.8}

/* Emotion Panel */
.emotion-current{background:linear-gradient(135deg,rgba(244,166,131,0.15),rgba(124,182,157,0.15));border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center}
.emotion-current .emo{font-size:36px;margin-bottom:8px}
.emotion-current .emo-name{font-size:18px;font-weight:700;color:var(--ink)}
.emotion-current .emo-organ{font-size:13px;color:var(--muted);margin:4px 0}
.emotion-current .emo-quote{font-size:14px;color:var(--accent);font-style:italic;margin-top:8px}
.emotion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.emotion-btn{background:#fff;border:2px solid var(--rule);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .2s}
.emotion-btn.active{border-color:var(--accent);background:var(--accent-light)}
.emotion-btn .emo-icon{font-size:28px;display:block;margin-bottom:4px}
.emotion-btn .emo-label{font-size:12px;font-weight:600;color:var(--ink)}
.emotion-cure{background:var(--bg2);border-radius:12px;padding:14px;margin-top:12px}
.emotion-cure .cure-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px}
.emotion-cure .cure-text{font-size:13px;color:var(--ink);line-height:1.6}

/* Wulao Panel */
.wulao-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
.wulao-card .wl-icon{font-size:32px;flex-shrink:0}
.wulao-card .wl-info{flex:1}
.wulao-card .wl-name{font-size:15px;font-weight:700;margin-bottom:2px}
.wulao-card .wl-scene{font-size:12px;color:var(--muted);margin-bottom:4px}
.wulao-card .wl-action{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:2px}
.wulao-card .wl-tip{font-size:12px;color:var(--ink);line-height:1.5}

/* ========== Pack Management ========== */
.pack-card{background:#fff;border-radius:var(--radius);margin:0 16px 12px;box-shadow:var(--shadow);overflow:hidden}
.pack-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background .2s}
.pack-header:active{background:var(--bg2)}
.pack-header-left{display:flex;align-items:center;gap:10px;flex:1}
.pack-emoji{font-size:24px}
.pack-title{font-size:15px;font-weight:700}
.pack-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.pack-toggle{font-size:18px;color:var(--muted);transition:transform .3s}
.pack-toggle.expanded{transform:rotate(180deg)}
.pack-body{display:none;padding:0 16px 16px}
.pack-body.expanded{display:block}
.pack-quote{font-size:12px;color:var(--muted);font-style:italic;background:var(--bg2);padding:10px 12px;border-radius:10px;margin-bottom:12px;line-height:1.6}
.pack-tip{font-size:13px;color:var(--ink);margin-bottom:12px;line-height:1.5}
.pack-habit-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px}
.pack-habit-item .ph-icon{font-size:20px}
.pack-habit-item .ph-info{flex:1;min-width:0}
.pack-habit-item .ph-name{font-size:14px;font-weight:600}
.pack-habit-item .ph-meta{font-size:11px;color:var(--muted)}
.pack-habit-item .ph-status{font-size:12px;font-weight:600;padding:4px 10px;border-radius:10px;white-space:nowrap}
.pack-habit-item .ph-status.added{background:var(--accent-light);color:var(--accent)}
.pack-habit-item .ph-status.add{background:var(--accent);color:#fff}
.pack-actions{display:flex;gap:8px;margin-top:12px}
.pack-actions button{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:600}
.pack-actions .import-all{background:var(--accent);color:#fff}
.pack-actions .import-all:active{background:#6aa88a}
.pack-actions .custom-import{background:var(--bg2);color:var(--ink)}
.pack-actions .custom-import:active{background:var(--rule)}
.my-pack .pack-header{background:linear-gradient(135deg,var(--accent-light),var(--accent2-light))}
.my-pack .pack-title{color:var(--ink)}
.pack-search{width:calc(100% - 32px);margin:0 16px 12px;padding:10px 14px;border:2px solid var(--rule);border-radius:12px;font-size:14px;background:#fff;outline:none}
.pack-search:focus{border-color:var(--accent)}
.pack-filter{display:flex;gap:6px;margin:0 16px 12px;overflow-x:auto;padding-bottom:4px}
.pack-filter-btn{padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;background:var(--bg2);white-space:nowrap;transition:all .2s}
.pack-filter-btn.active{background:var(--accent);color:#fff}
.my-habit-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px}
.my-habit-item .mh-icon{font-size:22px}
.my-habit-item .mh-info{flex:1;min-width:0}
.my-habit-item .mh-name{font-size:14px;font-weight:600;margin-bottom:2px}
.my-habit-item .mh-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.my-habit-item .mh-toggle{width:44px;height:24px;border-radius:12px;background:var(--rule);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.my-habit-item .mh-toggle.on{background:var(--accent)}
.my-habit-item .mh-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.my-habit-item .mh-toggle.on::after{transform:translateX(20px)}
.my-habit-item .mh-actions{display:flex;gap:6px;flex-shrink:0}
.my-habit-item .mh-actions button{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:600;background:var(--bg2)}
.my-habit-item .mh-actions button:active{background:var(--rule)}
.my-habit-item .mh-delete{color:#e74c3c}
.pack-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:14px}
.add-habit-btn{width:calc(100% - 32px);margin:8px 16px 0;padding:12px;border-radius:12px;background:var(--bg2);color:var(--ink);font-size:14px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s}
.add-habit-btn:active{background:var(--rule)}
.manage-helpers{display:flex;gap:8px;margin:16px;padding:0 16px}
.manage-helpers button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--muted)}
.manage-helpers button:active{background:var(--rule)}

.sub-pack-card{background:#fff}
.sub-pack-card .pack-header:active{background:var(--rule)}

/* Water Tracker Optimizations */
.water-cups-row{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0;justify-content:center}
.water-cup{width:28px;height:36px;border-radius:6px 6px 2px 2px;background:var(--bg2);display:flex;align-items:flex-end;justify-content:center;overflow:hidden;position:relative;transition:all .3s}
.water-cup.filled{background:var(--accent)}
.water-cup.filled::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70%;background:rgba(255,255,255,.3);border-radius:0 0 2px 2px}
.water-cup-num{font-size:9px;color:var(--muted);position:absolute;bottom:2px;font-weight:700}
.water-cup.filled .water-cup-num{color:#fff}
.water-timeline{display:flex;gap:4px;overflow-x:auto;padding:8px 0;margin:8px 0;scrollbar-width:none}
.water-timeline::-webkit-scrollbar{display:none}
.water-timeline-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 8px;border-radius:10px;background:var(--bg2);min-width:50px}
.water-timeline-item.done{background:var(--accent-light)}
.water-timeline-time{font-size:10px;color:var(--muted);font-weight:600}
.water-timeline-item.done .water-timeline-time{color:var(--accent)}
.water-timeline-icon{font-size:14px}
.water-timeline-amount{font-size:9px;color:var(--muted)}
.water-timeline-item.done .water-timeline-amount{color:var(--accent)}
.water-smart-tip{font-size:12px;color:var(--accent);background:var(--accent-light);padding:8px 12px;border-radius:10px;margin:8px 0;text-align:center;font-weight:600}
.water-week-link{font-size:12px;color:var(--accent);text-align:center;padding:8px;margin-top:4px;cursor:pointer;font-weight:600}
.water-week-link:active{opacity:.7}

</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 今日养生卡片 -->
<div class="today-card" id="todayCard">

      <span class="today-date" id="todayDate"></span>

      <div class="pack-filter" id="myPackFilter">

  <div id="systemPacks"></div>

  </div>

<script>
// ===================== DATA =====================

const HABIT_LIBRARY = [
  // 早晨
  {id:'early_rise',name:'早起',icon:'☀️',category:'morning',type:'boolean',unit:'',tip:'建议6:00-7:00起床，顺应阳气生发'},
  {id:'morning_run',name:'晨跑',icon:'🏃',category:'morning',type:'timer',unit:'分钟',tip:'建议20-30分钟，微汗即可，空腹或早餐后1小时'},
  {id:'breakfast',name:'早餐',icon:'🥣',category:'morning',type:'boolean',unit:'',tip:'建议7:00-8:00，包含碳水+蛋白质+蔬果'},

function getCurrentShichen() {
  const hour = new Date().getHours();
  for (const sc of BODY_CLOCK) {
    if (sc.start <= sc.end) {
      if (hour >= sc.start && hour < sc.end) return sc;
    } else {
      if (hour >= sc.start || hour < sc.end) return sc;
    }
  }
  return BODY_CLOCK[0];
}

function getCurrentSolarTerm() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  // Find closest upcoming or current solar term
  for (const term of SOLAR_TERMS) {
    if (term.month === m && Math.abs(term.day - d) <= 3) {
      return term;
    }
  }
  return null;
}

function loadData() {
  try {
    const cfg = localStorage.getItem('habits_config');
    if (cfg) {
      habitsConfig = JSON.parse(cfg);
    } else {
      // First time: default 6 habits
      habitsConfig = DEFAULT_HABITS.map(id => {
        const lib = HABIT_LIBRARY.find(h => h.id === id);
        return {
          id: lib.id,
          name: lib.name,
          icon: lib.icon,
          category: lib.category,
          type: lib.type,
          unit: lib.unit,
          reminder: {enabled:false, time:'08:00', days:[0,1,2,3,4,5,6], method:'in-app'}
        };
      });
      saveConfig();
    }

    const rec = localStorage.getItem('checkin_records');
    if (rec) {
      checkinRecords = JSON.parse(rec);
      // Backward compatibility: convert old array format
      migrateOldFormat();
    } else {
      checkinRecords = {};
    }
  } catch(e) {
    console.error('Load data error:', e);
    habitsConfig = [];
    checkinRecords = {};
  }
}

function migrateOldFormat() {
  for (const dateKey in checkinRecords) {
    const entry = checkinRecords[dateKey];
    if (Array.isArray(entry)) {
      const newObj = {};
      entry.forEach(item => {
        if (item && item.id) {
          newObj[item.id] = {done: true, value: item.value || 1};
        }
      });
      checkinRecords[dateKey] = newObj;
    }
  }
  saveRecords();
}

const LUNAR_MONTHS = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAYS = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function getLunarDate(date) {
  const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
  let year = y, month = m + 1, day = d;
  let offset = (Date.UTC(y, m, d) - Date.UTC(1900, 0, 31)) / 86400000;
  let i, leap = 0, temp = 0;
  for (i = 1900; i < 2100 && offset > 0; i++) {
    temp = lYearDays(i); offset -= temp;
  }
  if (offset < 0) { offset += temp; i--; }
  year = i;
  leap = leapMonth(i);
  let isLeap = false;
  for (i = 1; i < 13 && offset > 0; i++) {
    if (leap > 0 && i === leap + 1 && !isLeap) { i--; isLeap = true; temp = leapDays(year); }
    else { temp = monthDays(year, i); }
    if (isLeap && i === leap + 1) isLeap = false;
    offset -= temp;
  }
  if (offset === 0 && leap > 0 && i === leap + 1) {
    if (isLeap) { isLeap = false; } else { isLeap = true; i--; }
  }
  if (offset < 0) { offset += temp; i--; }
  month = i; day = offset + 1;
  return {year, month, day, monthStr: LUNAR_MONTHS[month-1], dayStr: LUNAR_DAYS[day-1], isLeap};
}
function lYearDays(y) { let i, sum = 348; for(i=0x8000;i>0x8;i>>=1) sum += (LUNAR_INFO[y-1900]&i)?1:0; return sum+leapDays(y); }
function leapDays(y) { if(leapMonth(y)) return (LUNAR_INFO[y-1900]&0x10000)?30:29; return 0; }
function leapMonth(y) { return LUNAR_INFO[y-1900]&0xf; }
function monthDays(y,m) { return (LUNAR_INFO[y-1900]&(0x10000>>m))?30:29; }

function getCurrentSeason() {
  const month = new Date().getMonth() + 1;
  for (const [key, pack] of Object.entries(SEASONAL_PACKS)) {
    if (pack.months.includes(month)) return key;
  }
  return 'spring';
}

function getSeasonPack(season) {
  return SEASONAL_PACKS[season] || SEASONAL_PACKS.spring;
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDayOfWeek() {
  return new Date().getDay();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getStreak(habitId) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = formatDate(d);
    const rec = checkinRecords[key];
    if (rec && rec[habitId] && rec[habitId].done) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getMaxStreak(habitId) {
  let max = 0, cur = 0;
  const dates = Object.keys(checkinRecords).sort();
  if (dates.length === 0) return 0;
  const start = new Date(dates[0]);
  const end = new Date();
  const d = new Date(start);
  while (d <= end) {
    const key = formatDate(d);
    const rec = checkinRecords[key];
    if (rec && rec[habitId] && rec[habitId].done) {
      cur++;
      max = Math.max(max, cur);
    } else {
      cur = 0;
    }
    d.setDate(d.getDate() + 1);
  }
  return max;
}

function getCompletionRate(habitId, days) {
  let done = 0;
  const d = new Date();
  for (let i = 0; i < days; i++) {
    const key = formatDate(d);
    const rec = checkinRecords[key];
    if (rec && rec[habitId] && rec[habitId].done) done++;
    d.setDate(d.getDate() - 1);
  }
  return Math.round((done / days) * 100);
}

function getWeekRate() {
  if (habitsConfig.length === 0) return 0;
  let total = 0, done = 0;
  const d = new Date();
  for (let i = 0; i < 7; i++) {
    const key = formatDate(d);
    const rec = checkinRecords[key];
    habitsConfig.forEach(h => {
      total++;
      if (rec && rec[h.id] && rec[h.id].done) done++;
    });
    d.setDate(d.getDate() - 1);
  }
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function getMonthRate() {
  if (habitsConfig.length === 0) return 0;
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  let total = 0, done = 0;
  for (let i = 1; i <= daysInMonth; i++) {
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const rec = checkinRecords[key];
    habitsConfig.forEach(h => {
      total++;
      if (rec && rec[h.id] && rec[h.id].done) done++;
    });
  }
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

function getTodayDone() {
  const rec = checkinRecords[today()] || {};
  return habitsConfig.filter(h => h.enabled !== false && rec[h.id] && rec[h.id].done).length;
}

function getTodayTotal() {
  return habitsConfig.filter(h => h.enabled !== false).length;
}

function renderCheckin() {
  const container = document.getElementById('checkinContent');
  const rec = checkinRecords[today()] || {};
  const now = new Date();
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  // Get next reminder time for sorting
  function getNextTime(h) {
    if (h.type === 'water' && h.waterConfig?.schedule) {
      const doneTimes = new Set((rec[h.id]?.cups || []).map(c => c.time));
      for (const s of h.waterConfig.schedule) {
        const [sh, sm] = s.time.split(':').map(Number);
        const schedMin = sh * 60 + sm;
        if (!doneTimes.has(s.time) && schedMin >= nowMinutes) return schedMin;
      }
      return 9999; // all done or all past
    }
    if (h.reminder?.enabled) {
      const [rh, rm] = h.reminder.time.split(':').map(Number);
      return rh * 60 + rm;
    }
    const tp = CATEGORY_MAP[h.category]?.timePeriod || 'daytime';
    const defaults = {morning:420, forenoon:600, afternoon:840, evening:1260, daytime:720};
    return defaults[tp] || 720;
  }

  function isChecked(h) {
    if (h.type === 'water') return (rec[h.id]?.value || 0) >= (h.waterConfig?.dailyGoal || 2000);
    return rec[h.id] && rec[h.id].done;
  }

  // Collect all enabled habits with sort info
  const items = [];
  habitsConfig.forEach(h => {
    if (h.enabled === false) return;
    const checked = isChecked(h);
    const nextTime = getNextTime(h);
    const overdue = !checked && nextTime < nowMinutes;
    const soon = !checked && !overdue && nextTime <= nowMinutes + 60;
    items.push({h, checked, nextTime, overdue, soon});
  });

  // Sort: overdue first, then soon, then by nextTime, then done
  items.sort((a, b) => {
    if (a.checked !== b.checked) return a.checked ? 1 : -1;
    if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
    if (a.soon !== b.soon) return a.soon ? -1 : 1;
    return a.nextTime - b.nextTime;
  });

  // Weekly report
  const dow = now.getDay();
  let html = '';
  if (dow === 0) {
    html += '<div class="report-card" style="cursor:pointer" onclick="openReportPanel()"><div class="report-title">📋 点击查看本周总结</div></div>';
  }

  // Count stats
  const total = items.length;
  const doneCount = items.filter(x => x.checked).length;
  const overdueCount = items.filter(x => x.overdue).length;

  // Progress bar at top
  if (total > 0) {
    const pct = Math.round((doneCount / total) * 100);
    html += `<div style="margin:0 16px 12px;padding:12px;background:var(--bg2);border-radius:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px">
        <span>今日进度 ${doneCount}/${total}</span>
        <span>${pct}%</span>
      </div>
      <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:4px;transition:width .3s"></div>
      </div>
      ${overdueCount > 0 ? `<div style="font-size:11px;color:#e74c3c;margin-top:4px;font-weight:600">⚠️ ${overdueCount}项已过时未完成</div>` : ''}
    </div>`;
  }

  // Render items
  items.forEach(({h, checked, nextTime, overdue, soon}) => {
    const collapsedClass = checked ? 'collapsed' : '';

    if (h.type === 'water') {
      html += renderWaterTracker(h, rec).replace('class="water-tracker"', `class="water-tracker ${collapsedClass}"`);
    } else if (h.type === 'select') {
      const selected = rec[h.id] ? rec[h.id].value : '';
      const tipStr2 = h.tip || '';
      const timeHint = overdue ? `<span style="color:#e74c3c;font-size:11px">已过期</span>` : soon ? `<span style="color:#f39c12;font-size:11px">即将</span>` : '';
      html += `
        <div class="habit-card ${collapsedClass}" id="card-${h.id}" onclick="openEmotionPanel()">
          <span class="icon">${h.icon}</span>
          <div class="info">
            <div class="name">${h.name}${selected ? '：' + selected : ''}</div>
            <div class="meta"><span style="color:var(--accent)">点击记录今日情绪</span>${timeHint}</div>
            ${tipStr2 ? `<div style="font-size:11px;color:var(--accent);margin-top:3px;line-height:1.4">💡 ${tipStr2}</div>` : ''}
          </div>
          <button class="checkin-btn ${selected ? 'done' : 'pending'}">${selected ? '✓' : '记录'}</button>
        </div>`;
    } else {
      const streak = getStreak(h.id);
      const reminder = h.reminder;
      const reminderStr = reminder && reminder.enabled ? reminder.time : '';
      const valueStr = checked ? (h.type === 'boolean' ? '' : ` ${rec[h.id].value}${h.unit}`) : '';
      const tipStr = h.tip || '';
      const timeHint = overdue ? `<span style="color:#e74c3c;font-size:11px">已过期</span>` : soon ? `<span style="color:#f39c12;font-size:11px">即将</span>` : '';
      html += `
        <div class="habit-card ${collapsedClass}" id="card-${h.id}">
          <span class="icon">${h.icon}</span>
          <div class="info">
            <div class="name">${h.name}${valueStr}</div>
            <div class="meta">
              ${reminderStr ? `<span>⏰ ${reminderStr}</span>` : ''}
              ${streak > 0 ? `<span class="streak">🔥${streak}天</span>` : ''}
              ${timeHint}
            </div>
            ${tipStr ? `<div style="font-size:11px;color:var(--accent);margin-top:3px;line-height:1.4">💡 ${tipStr}</div>` : ''}
          </div>
          <button class="checkin-btn ${checked ? 'done' : 'pending'}" onclick="handleCheckin('${h.id}')">
            ${checked ? '✓' : (h.type === 'boolean' ? '打卡' : h.type === 'count' ? '记录' : '记录')}
          </button>
        </div>`;
    }
  });

  if (items.length === 0) {
    html = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;">还没有添加习惯<br>点击下方 + 按钮开始添加</div>';
  }

  container.innerHTML = html;
}

function renderWaterTracker(h, rec) {
  const wc = h.waterConfig || {dailyGoal:2000, perCup:250, schedule:[]};
  const goal = wc.dailyGoal || 2000;
  const perCup = wc.perCup || 250;
  const waterRec = rec[h.id] || {};
  const value = waterRec.value || 0;
  const cups = waterRec.cups || [];
  const pct = Math.min(100, Math.round((value / goal) * 100));
  const remaining = Math.max(0, goal - value);
  const remainingCups = Math.ceil(remaining / perCup);
  const totalCups = Math.round(goal / perCup);
  const doneCups = Math.round(value / perCup);
  const streak = getStreak(h.id);

  let fillClass = '';
  if (pct >= 80) fillClass = 'high';
  else if (pct >= 50) fillClass = 'mid';

  // P3: Cup visualization
  let cupsViz = '<div class="water-cups-row">';
  for (let i = 0; i < totalCups; i++) {
    const filled = i < doneCups;
    cupsViz += `<div class="water-cup ${filled ? 'filled' : ''}"><span class="water-cup-num">${i+1}</span></div>`;
  }
  cupsViz += '</div>';

  // P1: Horizontal timeline
  let timelineHtml = '';
  if (wc.schedule && wc.schedule.length > 0) {
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    timelineHtml = '<div class="water-timeline">';
    wc.schedule.forEach(s => {
      const [sh, sm] = s.time.split(':').map(Number);
      const schedMinutes = sh * 60 + sm;
      const isPast = currentMinutes >= schedMinutes;
      const cupNum = Math.round(s.amount / perCup) || 1;
      timelineHtml += `<div class="water-timeline-item ${isPast ? 'done' : ''}">
        <span class="water-timeline-time">${s.time}</span>
        <span class="water-timeline-icon">${isPast ? '💧' : '⭕'}</span>
        <span class="water-timeline-amount">${cupNum}杯</span>
      </div>`;
    });
    timelineHtml += '</div>';
  }

  // P2: Smart reminder
  let smartTip = '';
  if (cups.length > 0) {
    const lastCup = cups[cups.length - 1];
    const [lh, lm] = lastCup.time.split(':').map(Number);
    const lastMinutes = lh * 60 + lm;
    const now = new Date();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    const diffMinutes = currentMinutes - lastMinutes;
    if (diffMinutes >= 120) {
      const hours = Math.floor(diffMinutes / 60);
      const mins = diffMinutes % 60;
      smartTip = `<div class="water-smart-tip">⏰ 距离上次喝水已 ${hours}小时${mins > 0 ? mins + '分钟' : ''}，建议补充${perCup}ml</div>`;
    }
  } else if (value === 0) {
    smartTip = `<div class="water-smart-tip">💧 今天还没喝水哦，来一杯吧！</div>`;
  }

  // Today's records (compact)
  let cupsHtml = '';
  if (cups.length > 0) {
    cupsHtml = '<div style="font-size:11px;color:var(--muted);margin-top:6px">今日：';
    cups.forEach((c, i) => {
      if (i > 0) cupsHtml += '、';
      cupsHtml += `${c.time} ${c.amount}ml`;
    });
    cupsHtml += '</div>';
  }

  return `<div class="water-tracker" id="card-${h.id}">
    <div class="water-header">
      <div class="water-title">${h.icon} ${h.name} ${streak > 0 ? `<span style="font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:10px;font-weight:600">🔥${streak}天</span>` : ''}</div>
      <div class="water-amount">${doneCups}杯(${value}ml) / ${totalCups}杯(${goal}ml)</div>
    </div>
    <div class="water-progress">
      <div class="water-progress-fill ${fillClass}" style="width:${pct}%"></div>
      <div class="water-progress-text">${pct}%</div>
    </div>

function quickAddWater(habitId, amount) {
  const rec = checkinRecords[today()] || {};
  const waterRec = rec[habitId] || {done: true, value: 0, cups: []};
  if (!waterRec.cups) waterRec.cups = [];
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  waterRec.cups.push({time: timeStr, amount: amount});
  waterRec.value = (waterRec.value || 0) + amount;
  waterRec.done = true;
  rec[habitId] = waterRec;
  checkinRecords[today()] = rec;
  saveRecords();
  showToast(`💧 已记录 ${amount}ml`);
  render();
}

function renderStats() {
  const done = getTodayDone();
  const total = getTodayTotal();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Ring
  const circumference = 2 * Math.PI * 68;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('ringFg').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';

  // Stats grid
  let maxStreakAll = 0;
  habitsConfig.forEach(h => {
    maxStreakAll = Math.max(maxStreakAll, getMaxStreak(h.id));
  });
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-val">${done}/${total}</div><div class="stat-label">今日完成</div></div>
    <div class="stat-card"><div class="stat-val">${maxStreakAll}</div><div class="stat-label">最长连续</div></div>
    <div class="stat-card"><div class="stat-val">${getWeekRate()}%</div><div class="stat-label">本周率</div></div>
    <div class="stat-card"><div class="stat-val">${getMonthRate()}%</div><div class="stat-label">本月率</div></div>
  `;

  // Ranking
  const rankHtml = habitsConfig.map(h => {
    const rate = getCompletionRate(h.id, 30);
    const cls = rate >= 70 ? 'high' : rate >= 40 ? 'mid' : 'low';
    return `<div class="ranking-item">
      <div class="ranking-header"><span class="ranking-name">${h.icon} ${h.name}</span><span class="ranking-pct">${rate}%</span></div>
      <div class="ranking-bar"><div class="ranking-fill ${cls}" style="width:${rate}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('rankingList').innerHTML = rankHtml || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">暂无数据</div>';

  // Heatmap
  renderHeatmap();

  // Achievements
  renderAchievements();
}

function renderHeatmap() {
  const year = heatmapDate.getFullYear();
  const month = heatmapDate.getMonth();
  document.getElementById('heatmapMonth').textContent = `${year}年${month+1}月`;
  const grid = document.getElementById('heatmapGrid');
  const dayLabels = ['一','二','三','四','五','六','日'];
  let html = dayLabels.map(l => `<div class="heatmap-day-label">${l}</div>`).join('');

  const firstDay = new Date(year, month, 1);
  let startWeekday = firstDay.getDay();
  startWeekday = startWeekday === 0 ? 6 : startWeekday - 1; // Monday=0

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = today();

  // Empty cells before first day
  for (let i = 0; i < startWeekday; i++) {
    html += '<div class="heatmap-cell empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = checkinRecords[key] || {};
    const total = habitsConfig.length;
    let doneCount = 0;
    habitsConfig.forEach(h => {
      if (rec[h.id] && rec[h.id].done) doneCount++;
    });
    const ratio = total > 0 ? doneCount / total : 0;
    let cls = '';
    if (ratio > 0 && ratio <= 0.25) cls = 'l1';
    else if (ratio > 0.25 && ratio <= 0.5) cls = 'l2';
    else if (ratio > 0.5 && ratio <= 0.75) cls = 'l3';
    else if (ratio > 0.75) cls = 'l4';
    const todayCls = key === todayStr ? ' today' : '';
    html += `<div class="heatmap-cell ${cls}${todayCls}" title="${key}: ${doneCount}/${total}"></div>`;
  }

  grid.innerHTML = html;
}

function changeMonth(delta) {
  heatmapDate.setMonth(heatmapDate.getMonth() + delta);
  renderHeatmap();
}

function renderAchievements() {
  const container = document.getElementById('achievements');

function importPack(packId) {
  const packMap = {
    'healthPack': HEALTH_PACK,
    'neijingPack': (() => {
      const h = [];
      Object.values(SEASONAL_PACKS).forEach(sp => {
        sp.habits.forEach(x => { if (!h.find(y=>y.id===x.id)) h.push(x); });
      });
      HABIT_LIBRARY.filter(x=>['color_diet','emotion','wulao'].includes(x.category)).forEach(x => {
        if (!h.find(y=>y.id===x.id)) h.push({id:x.id});
      });
      return {habits: h};
    })(),
    'neijing_spring': SEASONAL_PACKS.spring,
    'neijing_summer': SEASONAL_PACKS.summer,
    'neijing_autumn': SEASONAL_PACKS.autumn,
    'neijing_winter': SEASONAL_PACKS.winter,
    'neijing_color': {habits: HABIT_LIBRARY.filter(h=>h.category==='color_diet').map(h=>({id:h.id}))},
    'neijing_emotion': {habits: HABIT_LIBRARY.filter(h=>h.category==='emotion').map(h=>({id:h.id}))},
    'neijing_wulao': {habits: HABIT_LIBRARY.filter(h=>h.category==='wulao').map(h=>({id:h.id}))}
  };
  const pack = packMap[packId];
  if (!pack) return;

  // Remove existing habits that will be replaced by the pack
  const packIds = new Set(pack.habits.map(ph => ph.id));
  let removedCount = 0;
  habitsConfig = habitsConfig.filter(h => {
    if (packIds.has(h.id)) {
      removedCount++;
      return false;
    }
    return true;
  });

  const myIds = new Set(habitsConfig.map(h => h.id));
  let addedCount = 0;
  pack.habits.forEach(ph => {
    if (myIds.has(ph.id)) return;
    const lib = HABIT_LIBRARY.find(h => h.id === ph.id);
    if (!lib) return;
    const newHabit = {
      id: lib.id, name: lib.name, icon: lib.icon, category: lib.category,
      type: lib.type, unit: lib.unit, enabled: true,
      reminder: {enabled:false, time:'08:00', days:[0,1,2,3,4,5,6], method:'in-app'}
    };
    if (ph.reminder) {
      newHabit.reminder = {enabled: ph.reminder.enabled, time: ph.reminder.time, days:[0,1,2,3,4,5,6], method:'in-app'};
    }
    if (lib.type === 'water' && lib.waterConfig) {
      newHabit.waterConfig = JSON.parse(JSON.stringify(lib.waterConfig));
      newHabit.reminder = {enabled:true, method:'in-app'};
    }
    habitsConfig.push(newHabit);
    myIds.add(ph.id);
    addedCount++;
  });
  if (addedCount > 0 || removedCount > 0) {
    saveConfig();
    const msg = [];
    if (removedCount > 0) msg.push(`已替换 ${removedCount} 个现有习惯`);
    if (addedCount > 0) msg.push(`已导入 ${addedCount} 个新习惯`);
    showToast(msg.join('，'));
    renderSystemPacks();
    renderMyPack();
    render();
  } else {
    showToast('包内习惯已全部添加');
  }
}

function removeSubPack(spId) {
  const spMap = {
    'neijing_spring': SEASONAL_PACKS.spring,
    'neijing_summer': SEASONAL_PACKS.summer,
    'neijing_autumn': SEASONAL_PACKS.autumn,
    'neijing_winter': SEASONAL_PACKS.winter,
    'neijing_color': {habits: HABIT_LIBRARY.filter(h=>h.category==='color_diet').map(h=>({id:h.id}))},
    'neijing_emotion': {habits: HABIT_LIBRARY.filter(h=>h.category==='emotion').map(h=>({id:h.id}))},
    'neijing_wulao': {habits: HABIT_LIBRARY.filter(h=>h.category==='wulao').map(h=>({id:h.id}))}
  };
  const sp = spMap[spId];
  if (!sp) return;
  const ids = new Set(sp.habits.map(ph => ph.id));
  const before = habitsConfig.length;
  habitsConfig = habitsConfig.filter(h => !ids.has(h.id));
  const removed = before - habitsConfig.length;
  if (removed > 0) {
    saveConfig();
    showToast(`已解除导入 ${removed} 个习惯`);
    renderSystemPacks();
    renderMyPack();
    render();
  } else {
    showToast('该子包没有习惯需要解除');
  }
}

// ===================== CHECKIN =====================

function handleCheckin(habitId) {
  const h = habitsConfig.find(x => x.id === habitId);
  if (!h) return;
  const rec = checkinRecords[today()] || {};

  if (h.type === 'water') {
    openWaterInputPanel(habitId);
    return;
  }

  if (h.type === 'boolean') {
    if (rec[habitId] && rec[habitId].done) {
      // Undo
      delete rec[habitId];
      showToast('已撤销打卡');
    } else {
      rec[habitId] = {done: true, value: 1};
      showToast(`${h.icon} ${h.name} 打卡成功！`);
    }
    checkinRecords[today()] = rec;
    saveRecords();
    render();
  } else {
    // count or timer - show input panel
    pendingCheckinHabitId = habitId;
    document.getElementById('checkinPanelTitle').textContent = `${h.icon} ${h.name}`;
    document.getElementById('checkinInputLabel').textContent = h.type === 'count' ? '请输入数量' : '请输入时长';
    document.getElementById('checkinInputUnit').textContent = h.unit;
    const field = document.getElementById('checkinInputField');
    field.value = (rec[habitId] && rec[habitId].done) ? rec[habitId].value : '';
    field.placeholder = h.type === 'count' ? '0' : '0';
    openPanel('checkinPanel');
    setTimeout(() => field.focus(), 300);
  }
}

function confirmCheckinInput() {
  const field = document.getElementById('checkinInputField');
  const val = parseInt(field.value);
  if (isNaN(val) || val < 0) {
    showToast('请输入有效的数值');
    return;
  }
  const habitId = pendingCheckinHabitId;
  const h = habitsConfig.find(x => x.id === habitId);
  if (!h) return;

  const rec = checkinRecords[today()] || {};
  if (val === 0) {
    delete rec[habitId];
    showToast('已撤销记录');
  } else {
    rec[habitId] = {done: true, value: val};
    showToast(`${h.icon} ${h.name} 记录 ${val}${h.unit}！`);
  }
  checkinRecords[today()] = rec;
  saveRecords();
  closeAllPanels();
  render();
}

// ===================== REMINDER PANEL =====================

function openReminderPanel() {
  const body = document.getElementById('reminderPanelBody');
  const methods = [
    {value:'in-app', label:'应用内横幅', desc:'在应用内显示提醒横幅'},
    {value:'notification', label:'浏览器通知', desc:'通过浏览器推送通知提醒'},
    {value:'off', label:'关闭提醒', desc:'不接收任何提醒'}
  ];

  // Get current global reminder method from first habit or default
  let currentMethod = 'in-app';
  if (habitsConfig.length > 0 && habitsConfig[0].reminder) {
    currentMethod = habitsConfig[0].reminder.method || 'in-app';
  }

  body.innerHTML = `
    <div style="margin-bottom:16px;font-size:13px;color:var(--muted)">选择提醒方式（将应用到所有习惯）</div>
    ${methods.map(m => `
      <div class="reminder-option" onclick="setGlobalReminder('${m.value}')">
        <div class="radio ${currentMethod === m.value ? 'active' : ''}"></div>
        <div>
          <div class="label">${m.label}</div>
          <div class="desc">${m.desc}</div>
        </div>
      </div>
    `).join('')}
  `;
  openPanel('reminderPanel');
}

function setGlobalReminder(method) {
  habitsConfig.forEach(h => {
    if (!h.reminder) h.reminder = {enabled:false, time:'08:00', days:[0,1,2,3,4,5,6], method:'in-app'};
    h.reminder.method = method;
    if (method !== 'off') h.reminder.enabled = true;
    else h.reminder.enabled = false;
  });
  saveConfig();
  closeAllPanels();
  showToast('提醒设置已更新');
  render();
}

  const lib = HABIT_LIBRARY.find(h => h.id === id);

  const newHabit = {

    type: lib.type,

// ===================== WEEKLY REPORT =====================

function openReportPanel() {
  const body = document.getElementById('reportPanelBody');
  const d = new Date();
  // Get this week's data (Mon to Sun)
  const dow = d.getDay();
  const mondayOffset = dow === 0 ? 6 : dow - 1;
  const monday = new Date(d);
  monday.setDate(d.getDate() - mondayOffset);

  let totalDone = 0, totalAll = 0;
  const habitStats = {};

  habitsConfig.forEach(h => {
    habitStats[h.id] = {done: 0, total: 7, name: h.name, icon: h.icon};
  });

  for (let i = 0; i < 7; i++) {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    const key = formatDate(day);
    const rec = checkinRecords[key] || {};
    habitsConfig.forEach(h => {
      totalAll++;
      if (rec[h.id] && rec[h.id].done) {
        totalDone++;
        habitStats[h.id].done++;
      }
    });
  }

  const weekRate = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;

  // Find best and worst
  let best = null, worst = null;
  habitsConfig.forEach(h => {
    const s = habitStats[h.id];
    if (!best || s.done > best.done) best = s;
    if (!worst || s.done < worst.done) worst = s;
  });

  body.innerHTML = `
    <div class="report-card">
      <div class="report-title">📊 本周总结</div>
      <div class="report-stat">
        <div><div class="report-stat-val">${weekRate}%</div><div class="report-stat-label">完成率</div></div>
        <div><div class="report-stat-val">${totalDone}</div><div class="report-stat-label">总打卡</div></div>
        <div><div class="report-stat-val">${totalAll}</div><div class="report-stat-label">总任务</div></div>
      </div>
      ${best ? `<div class="report-item"><span class="emoji">🌟</span><span class="text">最佳习惯：${best.icon} ${best.name}（完成${best.done}天）</span></div>` : ''}
      ${worst && worst.done < 7 ? `<div class="report-item"><span class="emoji">💪</span><span class="text">需加油：${worst.icon} ${worst.name}（完成${worst.done}天）</span></div>` : ''}
    </div>
    <div style="font-size:13px;color:var(--muted);text-align:center;margin-top:8px">继续保持，下周会更好！</div>
  `;
  openPanel('reportPanel');
}

// ===================== CSV EXPORT =====================

function exportCSV() {
  const dates = Object.keys(checkinRecords).sort();
  if (dates.length === 0) {
    showToast('暂无数据可导出');
    return;
  }

  const headers = ['日期', ...habitsConfig.map(h => h.name)];
  const rows = [headers.join(',')];

  dates.forEach(date => {
    const rec = checkinRecords[date];
    const row = [date];
    habitsConfig.forEach(h => {
      if (rec && rec[h.id] && rec[h.id].done) {
        if (h.type === 'water') {
          row.push(rec[h.id].value + 'ml');
        } else {
          row.push(h.type === 'boolean' ? '✓' : rec[h.id].value);
        }
      } else {
        row.push('');
      }
    });
    rows.push(row.join(','));
  });

  const csv = '\uFEFF' + rows.join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `习惯打卡_${today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV已导出');
}

// ===================== WATER WEEK PANEL =====================

function openWaterWeekPanel(habitId) {
  const h = habitsConfig.find(x => x.id === habitId);
  const wc = h.waterConfig || {dailyGoal:2000};
  const goal = wc.dailyGoal || 2000;
  const todayD = new Date();

  let html = '<div style="padding:10px 0">';
  html += `<div style="text-align:center;margin-bottom:16px"><div style="font-size:18px;font-weight:700">📊 本周饮水</div><div style="font-size:12px;color:var(--muted);margin-top:4px">目标：${goal}ml/天</div></div>`;

  for (let i = 6; i >= 0; i--) {
    const d = new Date(todayD);
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayRec = checkinRecords[ds] || {};
    const waterRec = dayRec[habitId] || {};
    const val = waterRec.value || 0;
    const dayPct = Math.min(100, Math.round((val / goal) * 100));
    const isToday = i === 0;
    const dayName = ['日','一','二','三','四','五','六'][d.getDay()];

    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:${isToday ? 'var(--accent-light)' : 'var(--bg2)'};border-radius:12px">
      <div style="width:40px;text-align:center">
        <div style="font-size:12px;font-weight:700;color:var(--ink)">${dayName}</div>
        <div style="font-size:10px;color:var(--muted)">${d.getMonth()+1}/${d.getDate()}</div>
      </div>
      <div style="flex:1">
        <div style="height:20px;background:var(--bg);border-radius:10px;overflow:hidden;position:relative">
          <div style="height:100%;width:${dayPct}%;background:${dayPct >= 100 ? 'var(--accent)' : dayPct >= 50 ? '#7CB69D' : '#F4A683'};border-radius:10px;transition:width .5s"></div>
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--ink)">${val}ml (${dayPct}%)</div>
        </div>
      </div>
      <div style="font-size:16px">${dayPct >= 100 ? '✅' : dayPct > 0 ? '💧' : '⭕'}</div>
    </div>`;
  }

  html += '</div>';
  document.getElementById('checkinPanelTitle').textContent = '💧 饮水周统计';
  document.getElementById('checkinPanelBody').innerHTML = html;
  openPanel('checkinPanel');
}

  </div>`;

  // Schedule
  html += `<div style="margin-bottom:16px">

    <div id="waterScheduleList" style="display:flex;flex-direction:column;gap:6px">`;
  const schedule = wc.schedule || [];
  schedule.forEach((s, idx) => {
    html += `<div class="water-schedule-row" data-idx="${idx}" style="display:flex;gap:6px;align-items:center">
      <input type="time" class="ws-time" value="${s.time}" style="flex:1;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
      <input type="text" class="ws-label" value="${s.label}" placeholder="标签" style="flex:2;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
      <input type="number" class="ws-amount" value="${s.amount}" min="50" max="1000" step="50" placeholder="ml" style="width:70px;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
      <button onclick="removeWaterScheduleRow(${idx})" style="width:32px;height:32px;border-radius:8px;background:var(--bg2);color:#e74c3c;font-size:16px;border:none;cursor:pointer">✕</button>
    </div>`;
  });
  html += `</div>`;
  html += `<button onclick="addWaterScheduleRow()" style="width:100%;padding:8px;margin-top:6px;border-radius:8px;background:var(--bg2);color:var(--accent);font-size:13px;font-weight:600;border:none;cursor:pointer">+ 添加时间点</button>`;
  html += `</div>`;

  html += `<div style="display:flex;gap:10px;margin-top:20px">
    <button class="checkin-btn pending" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600" onclick="closeAllPanels()">取消</button>
    <button class="checkin-btn done" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600" onclick="saveWaterSettings()">保存</button>
  </div>`;

  html += `</div>`;

  body.innerHTML = html;
  openPanel('checkinPanel');
}

let waterScheduleTemp = [];

function addWaterScheduleRow() {
  const list = document.getElementById('waterScheduleList');
  const idx = list.children.length;
  const div = document.createElement('div');
  div.className = 'water-schedule-row';
  div.dataset.idx = idx;
  div.style.cssText = 'display:flex;gap:6px;align-items:center';
  div.innerHTML = `<input type="time" class="ws-time" value="08:00" style="flex:1;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
    <input type="text" class="ws-label" value="" placeholder="标签" style="flex:2;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
    <input type="number" class="ws-amount" value="250" min="50" max="1000" step="50" placeholder="ml" style="width:70px;padding:8px;border:2px solid var(--rule);border-radius:8px;font-size:14px;background:#fff;outline:none">
    <button onclick="this.parentElement.remove()" style="width:32px;height:32px;border-radius:8px;background:var(--bg2);color:#e74c3c;font-size:16px;border:none;cursor:pointer">✕</button>`;
  list.appendChild(div);
}

function removeWaterScheduleRow(idx) {
  const row = document.querySelector(`.water-schedule-row[data-idx="${idx}"]`);
  if (row) row.remove();
}

function saveWaterSettings() {
  const h = habitsConfig.find(x => x.id === pendingCheckinHabitId);
  if (!h) return;
  const goal = parseInt(document.getElementById('waterDailyGoal').value) || 2000;
  const perCup = parseInt(document.getElementById('waterPerCup').value) || 250;
  const rows = document.querySelectorAll('.water-schedule-row');
  const schedule = [];
  rows.forEach(row => {
    const time = row.querySelector('.ws-time').value;
    const label = row.querySelector('.ws-label').value;
    const amount = parseInt(row.querySelector('.ws-amount').value) || 250;
    if (time) schedule.push({time, label: label || '喝水', amount});
  });
  schedule.sort((a, b) => a.time.localeCompare(b.time));
  h.waterConfig = {dailyGoal: goal, perCup, schedule};
  saveConfig();
  showToast('饮水设置已保存');
  closeAllPanels();
  render();
}

function switchRefTab(tab) {
  document.getElementById('refTabAncient').classList.toggle('active', tab === 'ancient');

  document.getElementById('refListAncient').style.display = tab === 'ancient' ? '' : 'none';
  document.getElementById('refListModern').style.display = tab === 'modern' ? '' : 'none';
}

// ===================== EMOTION PANEL =====================

function openEmotionPanel() {
  renderEmotionPanel();
  openPanel('emotionPanel');
}

function renderEmotionPanel() {
  const body = document.getElementById('emotionPanelBody');
  const todayRec = checkinRecords[today()] || {};
  const emotionRec = todayRec['emotion_check'];
  let selected = null;
  if (emotionRec && emotionRec.value) {
    const map = {'怒':'anger','喜':'joy','思':'thinking','悲':'sorrow','恐':'fear'};
    selected = EMOTION_DATA.find(e => e.id === map[emotionRec.value]);
  }

  let html = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-align:center">《素问·阴阳应象大论》：怒伤肝，悲胜怒；喜伤心，恐胜喜...</div>
    <div class="emotion-grid">
  `;

  EMOTION_DATA.forEach(emo => {
    const isSel = selected && selected.id === emo.id;
    html += `<div class="emotion-btn ${isSel ? 'active' : ''}" onclick="selectEmotion('${emo.id}')">
      <span class="emo-icon">${emo.emoji}</span>
      <span class="emo-label">${emo.name}</span>
    </div>`;
  });

  html += '</div>';

  if (selected) {
    html += `
      <div class="emotion-current">
        <div class="emo">${selected.emoji}</div>
        <div class="emo-name">今日情绪：${selected.name}</div>
        <div class="emo-organ">伤及脏腑：${selected.organ} · 气机变化：${selected.damage}</div>
        <div class="emo-quote">"${selected.quote}"</div>
      </div>
      <div class="emotion-cure">
        <div class="cure-title">💡 调节建议（情志相胜）</div>
        <div class="cure-text">
          <strong>方法：</strong>以${selected.cureEmoji}${selected.cure}胜${selected.name}<br>
          <strong>实践：</strong>${selected.cureDesc}<br>
          <strong>原文：</strong>《素问·阴阳应象大论》"${selected.quote}"
        </div>
      </div>
    `;
  } else {
    html += `<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">👆 点击上方情绪图标记录今日心情</div>`;
  }

  body.innerHTML = html;
}

function selectEmotion(emotionId) {
  const emo = EMOTION_DATA.find(e => e.id === emotionId);
  if (!emo) return;
  const todayStr = today();
  if (!checkinRecords[todayStr]) checkinRecords[todayStr] = {};
  checkinRecords[todayStr]['emotion_check'] = {value: emo.name, timestamp: Date.now()};
  saveRecords();
  renderEmotionPanel();
  render();
}

function toggleGroup(period) {
  const group = document.getElementById('group-' + period);
  if (!group) return;
  group.classList.toggle('collapsed-group');
  const cards = group.querySelectorAll('.habit-card, .water-tracker');
  cards.forEach(card => {
    if (card.classList.contains('collapsed')) {
      card.classList.remove('collapsed');
    } else {
      card.classList.add('collapsed');
    }
  });
}
